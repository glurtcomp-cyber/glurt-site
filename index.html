<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLURT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

nav{
position:fixed;
top:0;
width:100%;
background:#050505e8;
backdrop-filter:blur(10px);
border-bottom:1px solid #111;
z-index:100;
}

.nav-inner{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1100px;
margin:auto;
padding:16px 20px;
}

.logo{
font-size:20px;
letter-spacing:4px;
font-weight:600;
animation:glitch 1.6s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 0 red,-2px 0 cyan}
50%{text-shadow:-2px 0 red,2px 0 cyan}
100%{text-shadow:2px 0 red,-2px 0 cyan}
}

.menu{
display:flex;
}

.menu a{
margin-left:22px;
color:#888;
text-decoration:none;
font-size:14px;
cursor:pointer;
}

.menu a:hover{color:white}

.hero{
min-height:100vh;
display:flex;
align-items:center;
}

.hero h1{
font-size:clamp(60px,14vw,120px);
}

.hero p{color:#aaa}

section{
padding:100px 0;
border-top:1px solid #111;
}

h2{
font-size:clamp(26px,6vw,36px);
margin-bottom:30px;
}

.discography{
display:flex;
gap:20px;
overflow-x:auto;
overflow-y:hidden;
scroll-behavior:smooth;
padding-bottom:10px;
}

.discography::-webkit-scrollbar{
height:6px;
}

.discography::-webkit-scrollbar-track{
background:#111;
}

.discography::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}

.album{
min-width:180px;
flex-shrink:0;
position:relative;
cursor:pointer;
}

.album img{
width:100%;
border-radius:6px;
transition:.35s;
}

.album:hover img{
transform:scale(1.05);
filter:contrast(120%);
}

.album span{
display:block;
margin-top:6px;
color:#aaa;
font-size:13px;
}

.hover-card{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%) scale(.9);
width:210px;
padding:16px;
background:#0a0a0af0;
border:1px solid #222;
border-radius:8px;
opacity:0;
pointer-events:none;
transition:.25s;
text-align:center;
backdrop-filter:blur(6px);
}

.hover-card.active{
opacity:1;
transform:translate(-50%,-50%) scale(1);
pointer-events:auto;
}

.quote{
font-size:12px;
color:#aaa;
margin-bottom:12px;
}

.wave{
width:100%;
height:40px;
margin-top:8px;
}

#links a{
display:block;
margin-bottom:10px;
color:#aaa;
text-decoration:none;
}

#links a:hover{color:white}

@media(max-width:750px){

.menu{
gap:12px;
}

.hero h1{
font-size:60px;
}

.container{
padding:30px 16px;
}

.album{
min-width:150px;
}

}

</style>

</head>

<body>

<nav>
<div class="nav-inner">

<div class="logo">GLURT</div>

<div class="menu">
<a data-scroll="#about">Обо мне</a>
<a data-scroll="#music">Музыка</a>
<a data-scroll="#links">Ссылки</a>
</div>

</div>
</nav>

<section class="hero container">

<div>
<h1>GLURT</h1>
<p>Музыка между шумом и тишиной.</p>
</div>

</section>

<section id="about" class="container">

<h2>Обо мне</h2>
<p>GLURT — независимый музыкальный проект.</p>

</section>

<section id="music" class="container">

<h2>Музыка</h2>

<div class="discography">

<div class="album"
data-audio="ISKRENNIY.mp3"
data-quote="Я с тобой самый искренний">

<img src="https://avatars.yandex.net/get-music-content/15406468/0810dae3.a.40798163-1/200x200">
<span>Искренний • 2026</span>

<div class="hover-card">

<div class="quote"></div>

<canvas class="wave"></canvas>

</div>

</div>

<div class="album"
data-audio="ISKRENNIY.mp3"
data-quote="В моей голове шум">

<img src="https://avatars.yandex.net/get-music-content/16469857/db61d810.a.40525428-1/200x200">
<span>Шум • 2026</span>

<div class="hover-card">

<div class="quote"></div>

<canvas class="wave"></canvas>

</div>

</div>

<div class="album"
data-audio="ISKRENNIY.mp3"
data-quote="Я надеюсь доживу до лета">

<img src="https://avatars.yandex.net/get-music-content/9784575/01109470.a.26243631-1/200x200">
<span>Дожить • 2023</span>

<div class="hover-card">

<div class="quote"></div>

<canvas class="wave"></canvas>

</div>

</div>

</div>

</section>

<section id="links" class="container">

<h2>Ссылки</h2>

<a href="#">Spotify</a> <a href="#">Apple Music</a> <a href="#">YouTube</a> <a href="#">VK</a> <a href="#">Telegram</a>

</section>

<script>

document.querySelectorAll("[data-scroll]").forEach(link=>{

link.addEventListener("click",()=>{

const id = link.dataset.scroll
const el = document.querySelector(id)

el.scrollIntoView({
behavior:"smooth"
})

})

})

const audio = new Audio()

const albums = document.querySelectorAll(".album")

albums.forEach(album=>{

const card = album.querySelector(".hover-card")
const quote = album.dataset.quote
const src = album.dataset.audio

album.querySelector(".quote").textContent = quote

function play(){

if(!src) return

audio.src = src
audio.play()

startWave(album)

}

function stop(){

audio.pause()
audio.currentTime = 0

}

album.addEventListener("mouseenter",()=>{

if(window.innerWidth>768){

card.classList.add("active")
play()

}

})

album.addEventListener("mouseleave",()=>{

if(window.innerWidth>768){

card.classList.remove("active")
stop()

}

})

album.addEventListener("click",()=>{

if(window.innerWidth<=768){

if(card.classList.contains("active")){

card.classList.remove("active")
stop()

}else{

card.classList.add("active")
play()

}

}

})

})

function startWave(album){

const canvas = album.querySelector(".wave")
const ctx = canvas.getContext("2d")

canvas.width = canvas.offsetWidth
canvas.height = canvas.offsetHeight

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=0;i<30;i++){

let x=i*10
let h=Math.random()*30

ctx.fillStyle="white"
ctx.fillRect(x,20-h/2,4,h)

}

if(!audio.paused){
requestAnimationFrame(draw)
}

}

draw()

}

</script>

</body>
</html>
